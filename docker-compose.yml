services:
  app:
    container_name: skillcorner-app
    image: ghcr.io/okhr/skillcorner-tech-test:latest
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./models:/app/models
      - ./logs:/app/logs
      - ./visualizations:/app/visualizations
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - UV_CACHE_DIR=/tmp/uv-cache
    command: ["--model_size", "nano"] # Overrides entrypoint arguments if needed

  prometheus:
    container_name: skillcorner-prometheus
    image: prom/prometheus:latest
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    container_name: skillcorner-grafana
    image: grafana/grafana:latest
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "3000:3000"
    volumes:
      - ./grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      